<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RoomEstate — Public Profile</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-content">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1 class="page-title">User <span>Profile</span></h1>
    </div>

    <div class="form-card" style="margin-bottom: 2rem;">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
            <div style="font-size: 3rem;"><i class="fa-solid fa-user-circle"></i></div>
            <div>
                <h2 style="color: var(--navy); margin-bottom: 0.25rem;" th:text="${targetUser.name}">Name</h2>
                <p style="color: var(--grey-mid); font-size: 0.875rem;">Member of RoomEstate</p>
            </div>
        </div>
        
        <div class="room-detail-meta" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="room-meta-row">
                <span class="room-meta-label"><i class="fa-solid fa-envelope"></i> Email</span>
                <span class="room-meta-value" th:text="${targetUser.email}">Email</span>
            </div>
            <div class="room-meta-row" th:if="${targetUser.phone != null and !targetUser.phone.isEmpty()}">
                <span class="room-meta-label"><i class="fa-solid fa-phone"></i> Phone</span>
                <span class="room-meta-value" th:text="${targetUser.phone}">Phone</span>
            </div>
            <div class="room-meta-row" th:if="${targetUser.gender != null and !targetUser.gender.isEmpty()}">
                <span class="room-meta-label"><i class="fa-solid fa-venus-mars"></i> Gender</span>
                <span class="room-meta-value" th:text="${targetUser.gender}">Gender</span>
            </div>
        </div>
    </div>

    <h2 class="page-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">Published <span>Rooms</span></h2>

    <div class="room-grid" th:if="${!userRooms.isEmpty()}">
        <div th:each="room : ${userRooms}" class="room-card-wrapper">

            <a th:href="@{/rooms/{id}(id=${room.id})}" class="room-card">
                <div class="room-card-img" style="position: relative; overflow: hidden;">
                    <img th:src="@{/images/room.jpeg}" alt="Room Image" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0;" />
                    <span class="room-type-badge" style="position: relative; z-index: 1;" th:text="${room.type}">Type</span>
                </div>
                <div class="room-card-body">
                    <h3 class="room-card-title" th:text="${room.title}">Title</h3>
                    <p class="room-card-location">
                        <i class="fa-solid fa-location-dot"></i> <span th:text="${room.location}">Location</span>
                    </p>
                    <p class="room-card-desc" th:classappend="${room.description == null or room.description.isEmpty()} ? 'text-muted' : ''" th:text="${room.description != null and !room.description.isEmpty()} ? ${room.description} : 'There is no description for this room yet.'"></p>
                    <div class="room-card-footer">
                        <div class="room-card-price">
                            RM <span th:text="${room.price}">0</span>
                            <small>/month</small>
                        </div>
                        <span class="badge"
                              th:classappend="${room.status == 'Available'} ? 'badge-available' :
                                     (${room.status == 'Pending'} ? 'badge-pending' : 'badge-occupied')"
                              th:text="${room.status}">Status</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" th:if="${userRooms.isEmpty()}">
        <div class="empty-icon"><i class="fa-solid fa-house"></i></div>
        <p>This user has not published any rooms yet.</p>
    </div>

</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
