<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RoomEstate — Add Room</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-content">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1 class="page-title">
            <span th:if="${room.id == null}">Add New <span>Room</span></span>
            <span th:if="${room.id != null}">Edit <span>Room</span></span>
        </h1>
    </div>

    <div class="form-card" style="max-width:900px;">
        <form th:action="${room.id == null} ? @{/rooms/save} : @{/rooms/update/{id}(id=${room.id})}"
              th:object="${room}" method="post">

            <input type="hidden" th:field="*{id}"/>

            <!-- ── BASIC INFO ── -->
            <div class="facilities-section-title">Basic Information</div>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Room Title</label>
                    <input type="text" th:field="*{title}"
                           placeholder="e.g. Master Room at Serdang" required/>
                </div>
                <div class="form-group">
                    <label>Room Type</label>
                    <select th:field="*{type}" required onchange="toggleUnitFields(this)">
                        <option value="">-- Select Type --</option>
                        <option value="Single">Single Room</option>
                        <option value="Master">Master Room</option>
                        <option value="Whole Unit">Whole Unit</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Monthly Price (RM)</label>
                    <input type="number" th:field="*{price}"
                           placeholder="e.g. 650" min="0" step="0.01" required/>
                </div>
                <div class="form-group full-width">
                    <label>Location</label>
                    <input type="text" th:field="*{location}"
                           placeholder="e.g. Serdang, Selangor" required/>
                </div>
                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea th:field="*{description}"
                              placeholder="Describe the room..."></textarea>
                </div>
            </div>

            <!-- ── STATUS (edit only) ── -->
            <div class="form-grid" th:if="${room.id != null}">
                <div class="form-group">
                    <label>Status</label>
                    <select th:field="*{status}">
                        <option value="Available">Available</option>
                        <option value="Pending">Pending</option>
                        <option value="Occupied">Not Available (Rental Out)</option>
                    </select>
                </div>
            </div>

            <!-- ── WHOLE UNIT DETAILS ── -->
            <div id="unitFields" style="display:none;">
                <div class="facilities-section-title" style="margin-top:1.5rem;">
                    Unit Details
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Number of Bedrooms</label>
                        <input type="number" th:field="*{bedrooms}"
                               placeholder="e.g. 3" min="1"/>
                    </div>
                    <div class="form-group">
                        <label>Number of Bathrooms</label>
                        <input type="number" th:field="*{bathrooms}"
                               placeholder="e.g. 2" min="1"/>
                    </div>
                </div>
            </div>

            <!-- ── FACILITIES ── -->
            <div class="facilities-section-title" style="margin-top:1.5rem;">
                Facilities & Amenities
            </div>
            <div class="facilities-grid">

                <label class="facility-item">
                    <input type="checkbox" th:field="*{fullyFurnished}"/>
                    <span class="facility-check">✓</span>
                    <span>Fully Furnished</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{wifiIncluded}"/>
                    <span class="facility-check">✓</span>
                    <span>WiFi Included</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{airCond}"/>
                    <span class="facility-check">✓</span>
                    <span>Air Conditioning</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{digitalDoorLock}"/>
                    <span class="facility-check">✓</span>
                    <span>Digital Door Lock</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{carPark}"/>
                    <span class="facility-check">✓</span>
                    <span>Car Park</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{privateBathroom}"/>
                    <span class="facility-check">✓</span>
                    <span>Private Bathroom</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{sharedBathroom}"/>
                    <span class="facility-check">✓</span>
                    <span>Shared Bathroom</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{utilitiesIncluded}"/>
                    <span class="facility-check">✓</span>
                    <span>Utilities Included</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{cookingAllowed}"/>
                    <span class="facility-check">✓</span>
                    <span>Cooking Allowed</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{petsAllowed}"/>
                    <span class="facility-check">✓</span>
                    <span>Pets Allowed</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{noOwnerStays}"/>
                    <span class="facility-check">✓</span>
                    <span>No Owner Stays</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{serviceResidence}"/>
                    <span class="facility-check">✓</span>
                    <span>Service Residence</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{waterHeater}"/>
                    <span class="facility-check">✓</span>
                    <span>Water Heater</span>
                </label>

                <label class="facility-item">
                    <input type="checkbox" th:field="*{washingMachine}"/>
                    <span class="facility-check">✓</span>
                    <span>Washing Machine</span>
                </label>

            </div>

            <!-- Car park lots -->
            <div class="form-group" style="margin-top:1rem; max-width:200px; display:none;"
                 id="carParkLots">
                <label>Number of Car Park Lots</label>
                <input type="number" th:field="*{carParkLots}"
                       placeholder="e.g. 1" min="1"/>
            </div>

            <!-- Other facilities -->
            <div class="form-group" style="margin-top:1rem;">
                <label>Other Facilities</label>
                <input type="text" th:field="*{otherFacilities}"
                       placeholder="e.g. Swimming pool, Gym, BBQ area..."/>
            </div>

            <!-- FORM ACTIONS -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <span th:if="${room.id == null}">+ Save Room</span>
                    <span th:if="${room.id != null}">Update Room</span>
                </button>
                <a href="#" onclick="if(document.referrer) { window.history.back(); } else { window.location.href = '/dashboard'; } return false;" class="btn btn-secondary">Cancel</a>
            </div>

        </form>
    </div>

</div>

<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    function toggleUnitFields(select){
        const unitFields = document.getElementById('unitFields');
        unitFields.style.display = select.value === 'Whole Unit' ? 'block' : 'none';
    }

    function toggleCarParkLots(){
        const carParkCheckbox = document.querySelector('input[name="carPark"]');
        const carParkLots = document.getElementById('carParkLots');
        carParkLots.style.display = carParkCheckbox.checked ? 'block' : 'none';
    }

     window.onload = function() {
        const typeSelect = document.querySelector('select[name="type"]');
        if (typeSelect) toggleUnitFields(typeSelect);

        const carParkCheckbox = document.querySelector('input[name="carPark"]');
        if (carParkCheckbox) {
            toggleCarParkLots();
            carParkCheckbox.addEventListener('change', toggleCarParkLots);
        }
    }
</script>

</body>
</html>
